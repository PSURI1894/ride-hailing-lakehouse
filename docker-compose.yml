version: '3.8'

# Use Docker Compose profiles to manage RAM usage on local machines.
# Run specific tiers: `docker-compose --profile core up -d`

volumes:
  minio_data:
  redpanda_data:

services:
  # ==========================================
  # PROFILE: "core" (Ingestion & Storage)
  # ==========================================
  minio:
    image: minio/minio:RELEASE.2023-11-20T22-40-07Z
    profiles: ["core", "all"]
    container_name: minio
    ports:
      - "9000:9000"  # API
      - "9001:9001"  # Console
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=password123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    profiles: ["core", "all"]
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local http://minio:9000 admin password123;
      mc mb local/lakehouse;
      mc mb local/raw-taxi-data;
      exit 0;
      "

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v23.2.14
    profiles: ["core", "all"]
    container_name: redpanda
    command:
      - redpanda start
      - --smp 1
      - --memory 1G 
      - --reserve-memory 0M
      - --overprovisioned
      - --node-id 0
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
    ports:
      - "19092:19092"
      - "9644:9644" # Admin API
      - "8081:8081" # Schema Registry
    volumes:
      - redpanda_data:/var/lib/redpanda/data

  trip-producer:
    build:
      context: ./producer
      dockerfile: Dockerfile
    profiles: ["core", "all"]
    container_name: trip-producer
    environment:
      - KAFKA_BROKER=redpanda:9092
      - SCHEMA_REGISTRY_URL=http://redpanda:8081
      - KAFKA_TOPIC=trips.live
    depends_on:
      - redpanda

  # Spark Notebook environment for testing scripts
  spark-workspace:
    image: jupyter/pyspark-notebook:spark-3.5.0
    profiles: ["core", "all"]
    container_name: spark-workspace
    user: root
    environment:
      - GOOGLE_DEFAULT_CLIENT_ID=null # Supress warnings
    ports:
      - "8888:8888" # Jupyter
      - "4040:4040" # Spark UI
    volumes:
      - ./src:/home/jovyan/work/src
      - ./data:/home/jovyan/work/data
    depends_on:
      - minio
      - redpanda

  spark-bronze-ingestion:
    build:
      context: ./spark_jobs
      dockerfile: Dockerfile
    profiles: ["core", "all"]
    container_name: spark-bronze-ingestion
    environment:
      - KAFKA_BROKER=redpanda:9092
      - KAFKA_TOPIC=trips.live
      - AWS_ACCESS_KEY_ID=admin
      - AWS_SECRET_ACCESS_KEY=password123
    volumes:
      - ./producer/schemas:/app/producer/schemas
    depends_on:
      - trip-producer
      - minio-init

  # ==========================================
  # PROFILE: "serving" (Trino & BI)
  # ==========================================
  # (Placeholders for Phase 4 & 6 mapping)
  # trino: ...
  # superset: ...

  # ==========================================
  # PROFILE: "orchestration" (Airflow)
  # ==========================================
  airflow-init:
    build:
      context: ./airflow
    image: apache/airflow:2.9.0
    profiles: ["orchestration", "all"]
    container_name: airflow-init
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=sqlite:////opt/airflow/airflow.db
      - _AIRFLOW_DB_UPGRADE=true
      - _AIRFLOW_WWW_USER_CREATE=true
      - _AIRFLOW_WWW_USER_USERNAME=admin
      - _AIRFLOW_WWW_USER_PASSWORD=admin
    volumes:
      - ./airflow/dags:/opt/airflow/dags
    command: version

  airflow-webserver:
    build:
      context: ./airflow
    profiles: ["orchestration", "all"]
    container_name: airflow-webserver
    restart: always
    depends_on:
      - airflow-init
    ports:
      - "8080:8080"
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=sqlite:////opt/airflow/airflow.db
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - /var/run/docker.sock:/var/run/docker.sock
    command: webserver

  airflow-scheduler:
    build:
      context: ./airflow
    profiles: ["orchestration", "all"]
    container_name: airflow-scheduler
    restart: always
    depends_on:
      - airflow-init
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=sqlite:////opt/airflow/airflow.db
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - HOST_PROJECT_PATH=${PWD}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - /var/run/docker.sock:/var/run/docker.sock
    command: scheduler
