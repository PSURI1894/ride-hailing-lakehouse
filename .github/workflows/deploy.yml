name: Ephemeral Lakehouse Deployment

on:
  workflow_dispatch: # Allows you to manually click "Run workflow" from GitHub UI

env:
  AWS_REGION: us-east-1

jobs:
  deploy_run_destroy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: "1.5.0"

      - name: Terraform Init
        working-directory: ./infrastructure/terraform
        run: terraform init

      - name: Terraform Apply (Provision Cloud Architecture)
        id: apply
        working-directory: ./infrastructure/terraform
        run: |
          # Create an SSH keypair on the fly to access the ephemeral instance
          ssh-keygen -t rsa -b 2048 -f ./ephemeral_key -N ""
          export TF_VAR_public_key=$(cat ./ephemeral_key.pub)
          terraform apply -auto-approve
          echo "private_key<<EOF" >> $GITHUB_OUTPUT
          cat ./ephemeral_key >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Get EC2 and S3 Information
        id: info
        working-directory: ./infrastructure/terraform
        run: |
          echo "instance_ip=$(terraform output -raw instance_public_ip)" >> $GITHUB_OUTPUT
          echo "s3_bucket=$(terraform output -raw s3_bucket_name)" >> $GITHUB_OUTPUT

      - name: Wait for EC2 to Boot
        run: sleep 60

      - name: Execute Lakehouse Pipeline via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ steps.info.outputs.instance_ip }}
          username: ubuntu
          key: ${{ env.PRIVATE_KEY }}
          envs: GITHUB_SHA,S3_BUCKET_NAME
          script: |
            sudo apt-get update && sudo DEBIAN_FRONTEND=noninteractive apt-get install -y make docker.io docker-compose
            sudo systemctl enable --now docker
            sudo usermod -aG docker ubuntu
            
            git clone https://github.com/${{ github.repository }} project
            cd project
            git checkout $GITHUB_SHA
            
            # Start Redpanda and Producer using the cloud-optimized profile
            export S3_BUCKET_NAME=${{ steps.info.outputs.s3_bucket }}
            sudo -E docker-compose -f docker-compose.cloud.yml up -d --build redpanda trip-producer
            
            # Wait for data to flow (Redpanda boot + 1000 messages)
            echo "Waiting for Redpanda to boot and ingest data..."
            sleep 120
            
            # Run Spark Bronze Ingestion (Ephemeral run)
            echo "Running Spark Bronze Ingestion..."
            sudo -E docker-compose -f docker-compose.cloud.yml up spark-bronze-ingestion
            
            # Verification: Check docker logs
            sudo docker logs spark-bronze-ingestion
            
            echo "Success! Ephemeral Pipeline ran on t2.micro using S3."
        env:
          PRIVATE_KEY: ${{ steps.apply.outputs.private_key }}
          S3_BUCKET_NAME: ${{ steps.info.outputs.s3_bucket }}

      - name: Terraform Destroy (Teardown to prevent costs)
        if: always() # Ensure this runs even if the pipeline step fails!
        working-directory: ./infrastructure/terraform
        run: terraform destroy -auto-approve
