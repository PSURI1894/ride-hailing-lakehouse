name: Ephemeral Lakehouse Deployment

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Allows you to manually click "Run workflow" from GitHub UI

env:
  AWS_REGION: us-east-1

jobs:
  deploy_run_destroy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: "1.5.0"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: ./infrastructure/terraform
        run: terraform init

      - name: Terraform Apply (Provision Cloud Architecture)
        id: apply
        working-directory: ./infrastructure/terraform
        run: |
          # Create an SSH keypair on the fly to access the ephemeral instance
          ssh-keygen -t rsa -b 2048 -f ./ephemeral_key -N ""
          export TF_VAR_public_key=$(cat ./ephemeral_key.pub)
          terraform apply -auto-approve
          echo "private_key<<EOF" >> $GITHUB_OUTPUT
          cat ./ephemeral_key >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Get EC2 and S3 Information
        id: info
        working-directory: ./infrastructure/terraform
        run: |
          echo "instance_ip=$(terraform output -raw instance_public_ip)" >> $GITHUB_OUTPUT
          echo "s3_bucket=$(terraform output -raw s3_bucket_name)" >> $GITHUB_OUTPUT

      - name: Wait for EC2 to Boot
        run: sleep 60

      - name: Execute Lakehouse Pipeline via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ steps.info.outputs.instance_ip }}
          username: ubuntu
          key: ${{ env.PRIVATE_KEY }}
          command_timeout: 60m
          script: |
            # 1. Setup Environment & Swap (Critical for t2.micro)
            sudo apt-get update && sudo DEBIAN_FRONTEND=noninteractive apt-get install -y make docker.io docker-compose
            sudo systemctl enable --now docker
            sudo usermod -aG docker ubuntu
            
            # Create 2GB swap file so we don't OOM
            if [ ! -f /swapfile ]; then
              sudo fallocate -l 2G /swapfile
              sudo chmod 600 /swapfile
              sudo mkswap /swapfile
              sudo swapon /swapfile
            fi
            
            # 2. Clone and Setup
            sudo docker system prune -af # Clean up any failed intermediate layers
            rm -rf project # Clean start
            git clone https://github.com/${{ github.repository }} project
            cd project
            git checkout ${{ github.sha }}
            
            # 3. Start Data Flow
            export S3_BUCKET=${{ steps.info.outputs.s3_bucket }}
            echo "Starting Redpanda and Producer (Bucket: $S3_BUCKET)..."
            sudo -E S3_BUCKET=$S3_BUCKET docker-compose -f docker-compose.cloud.yml up -d --build redpanda trip-producer
            
            # 4. Wait for Redpanda Health
            echo "Waiting for Redpanda to be ready..."
            for i in {1..20}; do
              if sudo docker exec redpanda rpk cluster info > /dev/null 2>&1; then
                echo "Redpanda is READY."
                break
              fi
              echo "Waiting... ($i/20)"
              sleep 10
            done
            
            # 5. Run Spark Ingestion (Ephemeral)
            echo "Running Spark Bronze Ingestion..."
            sudo -E S3_BUCKET=$S3_BUCKET docker-compose -f docker-compose.cloud.yml up spark-bronze-ingestion
            
            # 6. Final Log Check
            sudo docker logs spark-bronze-ingestion
            echo "Pipeline finished successfully!"
        env:
          PRIVATE_KEY: ${{ steps.apply.outputs.private_key }}

      - name: Terraform Destroy (Teardown to prevent costs)
        if: always() # Ensure this runs even if the pipeline step fails!
        working-directory: ./infrastructure/terraform
        run: |
          # Re-export the public key variable for teardown if the file exists
          if [ -f ./ephemeral_key.pub ]; then
            export TF_VAR_public_key=$(cat ./ephemeral_key.pub)
          else
            export TF_VAR_public_key="dummy-key-for-teardown"
          fi
          terraform destroy -auto-approve
