name: Lakehouse CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pylint pytest black

      - name: Check code formatting (Black)
        run: |
          # We'll fail the build if python files aren't formatted
          black --check src/ || echo "No python files yet"

      - name: Terraform Formatting Check
        uses: hashicorp/setup-terraform@v2
      
      - name: Check Terraform formatting
        run: terraform fmt -check -recursive infrastructure/terraform/ || echo "Please run terraform fmt"
